<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Codex Voice loop</title>
  <desc id="desc">Codex thread activity is condensed into a context fragment, spoken by Realtime voice, and updated by teacher questions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111821"/>
      <stop offset="100%" stop-color="#1e241c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#f4c95d"/>
      <stop offset="100%" stop-color="#65d6ad"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="72" y="82" fill="#f7f3ea" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="760">Codex Voice</text>
  <text x="74" y="122" fill="#c7c0b5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">A compact context stream becomes live classroom conversation.</text>

  <g filter="url(#shadow)">
    <rect x="82" y="204" width="235" height="170" rx="20" fill="#f7f3ea"/>
    <text x="114" y="252" fill="#17202a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="760">Codex thread</text>
    <rect x="114" y="290" width="150" height="13" rx="7" fill="#5967d8"/>
    <rect x="114" y="320" width="118" height="13" rx="7" fill="#9aa39e"/>
    <rect x="114" y="350" width="172" height="13" rx="7" fill="#9aa39e"/>
  </g>

  <path d="M348 288 C410 236 474 236 536 288" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M516 264 L544 290 L508 300" fill="none" stroke="#65d6ad" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="558" y="174" width="270" height="224" rx="22" fill="#182532" stroke="#63776f" stroke-width="2"/>
    <text x="594" y="224" fill="#f7f3ea" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="760">Context fragment</text>
    <text x="594" y="268" fill="#c7c0b5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">recent goal</text>
    <text x="594" y="302" fill="#c7c0b5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">commands and checks</text>
    <text x="594" y="336" fill="#c7c0b5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">teacher questions</text>
  </g>

  <path d="M860 288 C912 238 964 238 1016 288" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M996 264 L1024 290 L988 300" fill="none" stroke="#65d6ad" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="930" y="204" width="210" height="170" rx="20" fill="#f4c95d"/>
    <text x="964" y="252" fill="#151515" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="800">Realtime</text>
    <text x="964" y="282" fill="#151515" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="800">voice</text>
    <circle cx="992" cy="326" r="22" fill="#151515"/>
    <path d="M1030 306 C1048 322 1048 338 1030 354" fill="none" stroke="#151515" stroke-width="8" stroke-linecap="round"/>
    <path d="M1064 292 C1098 322 1098 338 1064 368" fill="none" stroke="#151515" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="426" y="438" width="344" height="58" rx="29" fill="#f7f3ea"/>
    <text x="466" y="474" fill="#17202a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Professor asks or interrupts</text>
  </g>

  <path d="M950 410 C858 466 800 468 770 468" fill="none" stroke="#8b948d" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 14"/>
  <path d="M770 468 C710 468 692 428 692 400" fill="none" stroke="#8b948d" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 14"/>
  <path d="M676 416 L692 388 L710 416" fill="none" stroke="#8b948d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
